paths:
  metadata: /data/original_data/data_list.csv
  normalized_metadata: /data/processed/metadata.csv
  raw_documents: /data/original_data/files
  chunks: /data/processed/chunks_800_120.jsonl
  extraction_failures: /data/processed/extraction_failures.csv
  ocr_documents: /data/processed/ocr_documents.jsonl
  ocr_report: /data/processed/ocr_report.csv

chunking:
  chunk_size: 800
  chunk_overlap: 120

ocr:
  language: kor+eng
  min_width: 200
  min_height: 100
  min_text_length: 2

retrieval:
  active_profile: baseline
  top_k: 5 # fetch_k 적용으로 실제 검색 시 가져올 상위 결과 수 조정 (3 -> 5)
  search_method: similarity # similarity, mmr, hybrid(사용 불가)
  profiles:
    baseline:
      provider: lexical
    openai:
      provider: openai
      embedding_model: text-embedding-3-small # text-embedding-3-small(선택), text-embedding-3-large
      vector_db: chroma
      persist_directory: /data/processed/vector_db/openai # VM 경로로 저장 
      collection_name: bidmate_openai
      fetch_k: 100   # 부분 일치 검색 활용 / 100개 이상은 속도 저하, 노이즈 유입 가능성
      lambda_mult: 0.5 # MMR 다양성 조절 변수 / 0.0에 가까울수록 다양성 중시, 1.0에 가까울수록 관련성 중시
      batch_size: 1000 # vector DB에 데이터를 넣을 때 한 번에 처리할 데이터 수
    local:
      provider: huggingface
      embedding_model: null
      vector_db: chroma
      persist_directory: vector_db/local
      collection_name: bidmate_local

generation:
  provider: openai
  model: gpt-5-nano
  temperature: 0.1
  top_p: 0.95
  max_tokens: 3000
  history:
    max_turns: 3

experiments:
  advanced_search:
    - mmr
    - hybrid
    - rerank
