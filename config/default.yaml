paths:
  chunks: samples/processed/sample_chunks.jsonl

chunking:
  chunk_size: 800
  chunk_overlap: 120

retrieval:
  active_profile: baseline
  top_k: 3
  search_method: similarity
  profiles:
    baseline:
      provider: lexical
    openai:
      provider: openai
      embedding_model: null
      vector_db: chroma
      persist_directory: vector_db/openai
      collection_name: bidmate_openai
    local:
      provider: huggingface
      embedding_model: null
      vector_db: chroma
      persist_directory: vector_db/local
      collection_name: bidmate_local

generation:
  provider: baseline
  model: null

experiments:
  advanced_search:
    - mmr
    - hybrid
    - rerank
